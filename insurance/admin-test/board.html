<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<base href="/insurance/admin-test/">
<title>처리 보드 — 빌리지점 배서 보드</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<script src="assets/mock-data.js"></script>
<script src="assets/app.js"></script>
<script>
  VBE.renderHeader('board');
  if (!VBE.requireRole(['총무', '관리자'])) {
    /* requireRole 이 false면 본문이 교체되어 있으므로 이후 코드 실행 중단 */
  }
</script>

<main class="page" id="boardMain" style="display:none;">
  <div class="page-header">
    <h1>처리 보드</h1>
    <p class="muted">미완료 우선 정렬 · 인라인으로 상태를 바꿀 수 있습니다. 24시간 이상 접수 상태인 건은 강조 표시됩니다.</p>
  </div>

  <div class="kpi-strip">
    <div class="kpi-mini"><div class="label">전체 요청</div><div class="value" id="kpiTotal">-</div></div>
    <div class="kpi-mini"><div class="label">미처리 (접수+진행중)</div><div class="value" id="kpiOpen">-</div></div>
    <div class="kpi-mini alert"><div class="label">24시간 초과 접수</div><div class="value" id="kpiOverdue">-</div></div>
    <div class="kpi-mini"><div class="label">내가 잡은 건</div><div class="value" id="kpiMine">-</div></div>
  </div>

  <div class="board-layout">
    <aside class="board-filters card">
      <div class="filter-group">
        <h4>상태</h4>
        <ul class="filter-list" id="filterStatus"></ul>
      </div>
      <div class="filter-group">
        <h4>업무구분</h4>
        <ul class="filter-list" id="filterWorkType"></ul>
      </div>
      <div class="filter-group">
        <h4>소속팀</h4>
        <ul class="filter-list" id="filterTeam"></ul>
      </div>
      <div class="filter-group">
        <h4>담당총무</h4>
        <ul class="filter-list" id="filterAssignee"></ul>
      </div>
      <button class="btn btn-sm" id="resetFilters" style="width:100%;margin-top:8px;">필터 초기화</button>
    </aside>

    <div>
      <div class="card" style="margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <input class="input" id="searchBox" placeholder="요청ID·고객명·증권번호" style="max-width:280px;">
        <label class="checkbox-row" style="margin-left:auto;">
          <input type="checkbox" id="onlyMine">
          <span>내가 잡은 건만</span>
        </label>
      </div>

      <div class="table-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th>상태</th>
              <th>요청ID</th>
              <th>고객</th>
              <th>업무구분</th>
              <th>상담사</th>
              <th>제출</th>
              <th>담당</th>
              <th>상태 변경</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <p id="emptyMsg" class="muted" style="text-align:center;padding:32px 0;display:none;">조건에 맞는 요청이 없습니다.</p>
    </div>
  </div>
</main>

<footer class="app-footer">빌리지점 배서 보드 목업 · v0.1</footer>

<script>
(function () {
  const me = VBE.DB.currentUser();
  if (me.role !== '총무' && me.role !== '관리자') return;
  document.getElementById('boardMain').style.display = '';

  const filters = { status: 'all', workType: 'all', team: 'all', assignee: 'all', onlyMine: false, search: '' };
  const HOUR_24_MS = 24 * 60 * 60 * 1000;
  const now = new Date('2026-05-14T18:00:00+09:00').getTime();

  function allRequests() { return VBE.DB.requests(); }

  function applyFilters(list) {
    return list.filter(r => {
      if (filters.status !== 'all' && r.status !== filters.status) return false;
      if (filters.workType !== 'all' && r.workType !== filters.workType) return false;
      if (filters.team !== 'all' && r.team !== filters.team) return false;
      if (filters.assignee !== 'all') {
        if (filters.assignee === '__unassigned__' && r.assigneeEmail) return false;
        if (filters.assignee !== '__unassigned__' && r.assigneeEmail !== filters.assignee) return false;
      }
      if (filters.onlyMine && r.assigneeEmail !== me.email) return false;
      if (filters.search) {
        const q = filters.search.toLowerCase();
        if (!r.id.toLowerCase().includes(q) &&
            !r.customerName.toLowerCase().includes(q) &&
            !r.policyNumber.toLowerCase().includes(q)) return false;
      }
      return true;
    }).sort((a, b) => {
      const orderOf = s => ['접수', '진행중', '보류', '반려', '완료'].indexOf(s);
      const ord = orderOf(a.status) - orderOf(b.status);
      if (ord !== 0) return ord;
      return a.submittedAt.localeCompare(b.submittedAt);
    });
  }

  function renderKpis() {
    const all = allRequests();
    document.getElementById('kpiTotal').textContent = all.length;
    document.getElementById('kpiOpen').textContent = all.filter(r => r.status === '접수' || r.status === '진행중').length;
    document.getElementById('kpiOverdue').textContent = all.filter(r =>
      r.status === '접수' && (now - new Date(r.submittedAt).getTime() > HOUR_24_MS)).length;
    document.getElementById('kpiMine').textContent = all.filter(r => r.assigneeEmail === me.email && r.status !== '완료').length;
  }

  function renderFilters() {
    const all = allRequests();

    /* 상태 */
    const statusEl = document.getElementById('filterStatus');
    const statusKeys = [{ k: 'all', l: '전체' }].concat(window.MOCK_SEED.statuses.map(s => ({ k: s, l: s })));
    statusEl.innerHTML = statusKeys.map(({ k, l }) => {
      const cnt = k === 'all' ? all.length : all.filter(r => r.status === k).length;
      return `<li data-k="${k}" class="${filters.status === k ? 'active' : ''}">${l}<span class="count">${cnt}</span></li>`;
    }).join('');
    statusEl.querySelectorAll('li').forEach(li => li.addEventListener('click', () => { filters.status = li.dataset.k; renderAll(); }));

    /* 업무구분 */
    const wtEl = document.getElementById('filterWorkType');
    const wtKeys = [{ k: 'all', l: '전체' }].concat(window.MOCK_SEED.workTypes.map(w => ({ k: w, l: w })));
    wtEl.innerHTML = wtKeys.map(({ k, l }) => {
      const cnt = k === 'all' ? all.length : all.filter(r => r.workType === k).length;
      return `<li data-k="${k}" class="${filters.workType === k ? 'active' : ''}">${l}<span class="count">${cnt}</span></li>`;
    }).join('');
    wtEl.querySelectorAll('li').forEach(li => li.addEventListener('click', () => { filters.workType = li.dataset.k; renderAll(); }));

    /* 팀 */
    const teamEl = document.getElementById('filterTeam');
    const teams = Array.from(new Set(all.map(r => r.team))).sort();
    const teamKeys = [{ k: 'all', l: '전체' }].concat(teams.map(t => ({ k: t, l: t })));
    teamEl.innerHTML = teamKeys.map(({ k, l }) => {
      const cnt = k === 'all' ? all.length : all.filter(r => r.team === k).length;
      return `<li data-k="${k}" class="${filters.team === k ? 'active' : ''}">${l}<span class="count">${cnt}</span></li>`;
    }).join('');
    teamEl.querySelectorAll('li').forEach(li => li.addEventListener('click', () => { filters.team = li.dataset.k; renderAll(); }));

    /* 담당 총무 */
    const assigneeEl = document.getElementById('filterAssignee');
    const assignees = VBE.DB.users().filter(u => u.role === '총무');
    const aKeys = [
      { k: 'all', l: '전체' },
      { k: '__unassigned__', l: '미지정' },
    ].concat(assignees.map(u => ({ k: u.email, l: u.name })));
    assigneeEl.innerHTML = aKeys.map(({ k, l }) => {
      let cnt;
      if (k === 'all') cnt = all.length;
      else if (k === '__unassigned__') cnt = all.filter(r => !r.assigneeEmail).length;
      else cnt = all.filter(r => r.assigneeEmail === k).length;
      return `<li data-k="${k}" class="${filters.assignee === k ? 'active' : ''}">${l}<span class="count">${cnt}</span></li>`;
    }).join('');
    assigneeEl.querySelectorAll('li').forEach(li => li.addEventListener('click', () => { filters.assignee = li.dataset.k; renderAll(); }));
  }

  function renderTable() {
    const list = applyFilters(allRequests());
    const body = document.getElementById('tableBody');
    const empty = document.getElementById('emptyMsg');
    if (!list.length) { body.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    body.innerHTML = list.map(r => {
      const overdue = r.status === '접수' && (now - new Date(r.submittedAt).getTime() > HOUR_24_MS);
      const assigneeName = r.assigneeEmail ? ((VBE.DB.userByEmail(r.assigneeEmail) || {}).name || r.assigneeEmail) : '';
      return `
        <tr class="${overdue ? 'row-overdue' : ''}" data-id="${r.id}">
          <td>${VBE.statusBadge(r.status)}</td>
          <td class="mono">${r.id}</td>
          <td>
            <strong>${VBE.escapeHtml(r.customerName)}</strong>
            <div class="muted" style="font-size:11px;">${VBE.escapeHtml(r.policyNumber)}</div>
          </td>
          <td>${VBE.escapeHtml(r.workType)}</td>
          <td>${VBE.escapeHtml(r.advisorName)}<div class="muted" style="font-size:11px;">${VBE.escapeHtml(r.team)}</div></td>
          <td><span title="${VBE.fmtDate(r.submittedAt)}">${VBE.fmtRelative(r.submittedAt)}</span>${overdue ? '<div style="font-size:11px;color:var(--c-danger);font-weight:600;">⚠ 24h 초과</div>' : ''}</td>
          <td>${assigneeName ? VBE.escapeHtml(assigneeName) : '<button class="btn btn-sm pickup-btn" data-id="' + r.id + '">내가 잡기</button>'}</td>
          <td>
            <select class="status-select" data-id="${r.id}">
              ${window.MOCK_SEED.statuses.map(s => `<option value="${s}" ${s === r.status ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </td>
          <td><button class="btn btn-ghost btn-sm detail-btn" data-id="${r.id}">상세</button></td>
        </tr>
      `;
    }).join('');

    body.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', e => {
        e.stopPropagation();
        const id = sel.dataset.id;
        const req = allRequests().find(r => r.id === id);
        const newStatus = sel.value;
        if (newStatus === '반려' || newStatus === '보류') {
          /* 사유 필수 입력 — 상세 모달 열어서 작성 유도 */
          VBE.toast(`<strong>${newStatus}</strong> 상태로 변경하려면 사유를 입력해야 합니다. 상세 화면에서 메모를 작성해 주세요.`, 'warning', 4500);
          sel.value = req.status;
          VBE.showRequestDetail(req, { onUpdate: renderAll });
          return;
        }
        VBE.updateRequest(id, { status: newStatus }, me.email);
        const target = VBE.DB.userByEmail(req.advisorEmail);
        VBE.toast(`<strong>${target ? target.name : '상담사'}</strong>에게 처리 안내 이메일이 발송되었습니다. <span class="muted">(목업)</span>`, 'success');
        renderAll();
      });
    });
    body.querySelectorAll('.pickup-btn').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        const id = b.dataset.id;
        const req = allRequests().find(r => r.id === id);
        VBE.updateRequest(id, { assigneeEmail: me.email, status: req.status === '접수' ? '진행중' : req.status }, me.email);
        VBE.toast('이 건을 내 처리 목록으로 가져왔습니다.', 'info');
        renderAll();
      });
    });
    body.querySelectorAll('.detail-btn').forEach(b => {
      b.addEventListener('click', () => {
        const req = allRequests().find(r => r.id === b.dataset.id);
        VBE.showRequestDetail(req, { onUpdate: renderAll });
      });
    });
    body.querySelectorAll('tr').forEach(tr => {
      tr.addEventListener('click', () => {
        const req = allRequests().find(r => r.id === tr.dataset.id);
        VBE.showRequestDetail(req, { onUpdate: renderAll });
      });
    });
  }

  function renderAll() {
    renderKpis();
    renderFilters();
    renderTable();
  }

  document.getElementById('searchBox').addEventListener('input', e => { filters.search = e.target.value; renderTable(); });
  document.getElementById('onlyMine').addEventListener('change', e => { filters.onlyMine = e.target.checked; renderAll(); });
  document.getElementById('resetFilters').addEventListener('click', () => {
    filters.status = 'all'; filters.workType = 'all'; filters.team = 'all'; filters.assignee = 'all';
    filters.onlyMine = false; filters.search = '';
    document.getElementById('searchBox').value = '';
    document.getElementById('onlyMine').checked = false;
    renderAll();
  });

  renderAll();
})();
</script>
</body>
</html>
