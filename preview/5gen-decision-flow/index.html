<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>다이어그램 5장 비교 — 5세대 갈아타기</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Malgun Gothic',sans-serif;background:#fafafa;color:#222;line-height:1.6;padding:32px 0}
  .container{max-width:780px;margin:0 auto;padding:0 24px}
  h1{font-size:24px;margin-bottom:8px}
  .intro{font-size:14px;color:#666;margin-bottom:32px}
  .variant{margin-bottom:48px;background:#fff;border:1px solid #eee;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
  .variant h2{font-size:18px;color:#3a8a7a;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .variant h2 .tag{background:#3a8a7a;color:#fff;font-size:13px;padding:3px 10px;border-radius:8px}
  figure{margin:0;text-align:center}
  figure img{max-width:100%;height:auto;display:block;border-radius:12px;margin:0 auto}
  figcaption{font-size:13.5px;color:#666;margin-top:10px;line-height:1.6}
  .pick-note{background:#fff7e6;border:1px solid #ffd591;border-radius:10px;padding:14px 18px;margin-top:16px;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <h1>5세대 갈아타기 다이어그램 — 5장 비교</h1>
  <p class="intro">동일 텍스트 오버레이, 배경만 변주 5종 (medium quality). 실제 페이지(<a href="/guide/5세대-실손-갈아타기-가이드/">guide/5세대-실손-갈아타기-가이드</a>)의 컨테이너 폭(780px)과 같은 환경에서 렌더링.</p>
  <div class="pick-note">픽 결정 후 알려주세요. 채택본은 라이브 페이지의 <code>img-decision-flow.png/.webp</code> 로 교체되고 이 프리뷰 페이지는 제거됩니다.</div>
  
  <div class="variant">
    <h2><span class="tag">v1</span> 변주 1</h2>
    <figure>
      <picture>
        <source type="image/webp" srcset="diagram_v1.webp">
        <img src="diagram_v1.webp" alt="변주 1" width="1536" height="1024" loading="lazy">
      </picture>
    </figure>
  </div>
  <div class="variant">
    <h2><span class="tag">v2</span> 변주 2</h2>
    <figure>
      <picture>
        <source type="image/webp" srcset="diagram_v2.webp">
        <img src="diagram_v2.webp" alt="변주 2" width="1536" height="1024" loading="lazy">
      </picture>
    </figure>
  </div>
  <div class="variant">
    <h2><span class="tag">v3</span> 변주 3</h2>
    <figure>
      <picture>
        <source type="image/webp" srcset="diagram_v3.webp">
        <img src="diagram_v3.webp" alt="변주 3" width="1536" height="1024" loading="lazy">
      </picture>
    </figure>
  </div>
  <div class="variant">
    <h2><span class="tag">v4</span> 변주 4</h2>
    <figure>
      <picture>
        <source type="image/webp" srcset="diagram_v4.webp">
        <img src="diagram_v4.webp" alt="변주 4" width="1536" height="1024" loading="lazy">
      </picture>
    </figure>
  </div>
  <div class="variant">
    <h2><span class="tag">v5</span> 변주 5</h2>
    <figure>
      <picture>
        <source type="image/webp" srcset="diagram_v5.webp">
        <img src="diagram_v5.webp" alt="변주 5" width="1536" height="1024" loading="lazy">
      </picture>
    </figure>
  </div>
</div>
</body>
</html>
