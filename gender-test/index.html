        "acceptedAnswer": { "@type": "Answer", "text": "각도법은 임신 11~14주 초음파 사진에서 태아 골반 끝 성기결절이 척추와 이루는 각도로 성별을 추정하는 비공식 방법입니다. 의학적 진단법은 아니며 재미로 보는 도구입니다." }

        "@type": "Question",
        "name": "몇 주차 초음파 사진이 가장 좋나요?",
        "acceptedAnswer": { "@type": "Answer", "text": "11주~14주 사이가 가장 정확도가 높습니다. 이 시기에 성기결절이 가장 선명하게 관찰됩니다." }

      {
        "@type": "Question",
        "name": "각도법은 얼마나 정확한가요?",
        "acceptedAnswer": { "@type": "Answer", "text": "연구마다 차이가 있지만 11주에 약 70~80%, 12~13주에는 80% 이상이 보고되기도 합니다. 사진 각도와 화질에 크게 좌우됩니다." }
      },
      {
        "@type": "Question",
        "name": "어떤 사진을 올려야 하나요?",
        "acceptedAnswer": { "@type": "Answer", "text": "태아 옆모습(sagittal view)이 보이고, 척추 라인과 골반 끝 성기결절이 모두 식별되는 11~14주 초음파 사진을 권장합니다." }
      },
      {
        "@type": "Question",
        "name": "4D 컬러 초음파 사진도 분석되나요?",
        "acceptedAnswer": { "@type": "Answer", "text": "4D 컬러나 정면샷은 척추-너브 각도 측정이 어려워 정확도가 떨어집니다. 흑백 옆모습 사진을 권장합니다." }

      }
    ]
