<script>
const Q = [{"q":"1. 자녀 현재 나이는?","opts":[{"l":"0~2세 (영아)","v":"a","score":0,"tag":"baby"},{"l":"3~6세 (유아·취학 전)","v":"b","score":0,"tag":"preschool"},{"l":"7~12세 (초등)","v":"c","score":0,"tag":"elementary"},{"l":"13~15세 (중학)","v":"d","score":0,"tag":"middle"}]},{"q":"2. 현재 어린이보험 가입 상태?","opts":[{"l":"태아보험에서 자동 전환 (이미 가입)","v":"a","score":25,"tag":"has_fetal"},{"l":"출생 후 일반 가입","v":"b","score":22,"tag":"has_normal"},{"l":"미가입","v":"c","score":0,"tag":"no_insurance"}]},{"q":"3. 진단비 보장 한도는?","opts":[{"l":"3,000만 원 이상","v":"a","score":15,"tag":"high_coverage"},{"l":"1,000~3,000만 원","v":"b","score":10,"tag":"mid_coverage"},{"l":"1,000만 원 미만","v":"c","score":5,"tag":"low_coverage"},{"l":"잘 모름·확인 안 함","v":"d","score":2,"tag":"unknown"}]},{"q":"4. 필수 5대 특약 포함 여부?","opts":[{"l":"5가지 모두 포함 (선천·NICU·인큐베이터·소아암·실손)","v":"a","score":20,"tag":"all_essential"},{"l":"3~4가지 포함","v":"b","score":14,"tag":"most_essential"},{"l":"2가지 이하","v":"c","score":6,"tag":"few_essential"},{"l":"모름","v":"d","score":3,"tag":"unknown_essential"}]},{"q":"5. 자녀배상책임 특약 포함?","opts":[{"l":"포함 (1억 한도 이상)","v":"a","score":10,"tag":"has_liability"},{"l":"포함 (한도 미상)","v":"b","score":7,"tag":"has_liab_unknown"},{"l":"미포함","v":"c","score":0,"tag":"no_liability"}]},{"q":"6. 만기 구성은?","opts":[{"l":"100세 만기","v":"a","score":15,"tag":"lifetime"},{"l":"30세 만기","v":"b","score":8,"tag":"30y"},{"l":"20세 만기 이하","v":"c","score":3,"tag":"short"},{"l":"모름","v":"d","score":5,"tag":"unknown_term"}]},{"q":"7. 추가 진단·진료 이력?","opts":[{"l":"없음 (건강)","v":"a","score":15,"tag":"healthy"},{"l":"경증 (알레르기·아토피 등)","v":"b","score":8,"tag":"mild_diag"},{"l":"중증 (ADHD·천식·만성질환)","v":"c","score":3,"tag":"serious_diag"}]}];
let cur=0, ans=[];
function renderQ(){const q=Q[cur];const c=document.getElementById('qc');c.innerHTML='<div class="q-num">'+(cur+1)+' / '+Q.length+'</div><div class="q-text">'+q.q+'</div><div class="q-options">'+q.opts.map(function(o,i){return '<button class="q-option'+(ans[cur]===i?' selected':'')+'" onclick="select('+i+')">'+o.l+'</button>';}).join('')+'</div>';document.getElementById('progress').style.width=Math.round((cur+1)/Q.length*100)+'%';document.getElementById('bb').disabled=cur===0;document.getElementById('bn').disabled=ans[cur]===undefined;document.getElementById('bn').textContent=cur===Q.length-1?'결과 →':'다음 →';}
function select(i){ans[cur]=i;renderQ();}
function prevQ(){if(cur>0){cur--;renderQ();}}
function nextQ(){if(ans[cur]===undefined)return;if(cur===Q.length-1){showResult();}else{cur++;renderQ();}}
function showResult(){
  var score=0, tags=[];
  ans.forEach(function(i,qi){var o=Q[qi].opts[i];score+=o.score;tags.push(o.tag);});
  var maxScore=Q.reduce(function(s,q){return s+Math.max.apply(null,q.opts.map(function(o){return o.score;}));},0);
  var minScore=Q.reduce(function(s,q){return s+Math.min.apply(null,q.opts.map(function(o){return o.score;}));},0);
  var normalized=Math.max(0, Math.min(100, Math.round((score-minScore)/(maxScore-minScore)*100)));
  var result=(function(){if(normalized>=80){return {level:'✅ 보장 매우 적정',desc:'현재 자녀 보장이 충분합니다. 정기 점검만 유지하세요.'};}else if(normalized>=60){return {level:'✅ 보장 적정',desc:'대체로 적정한 보장입니다. 일부 특약·한도만 보강하면 완벽해져요.'};}else if(normalized>=40){return {level:'⚠️ 보장 부족',desc:'필수 특약·한도가 부족합니다. 재설계 권장.'};}else if(normalized>=20){return {level:'⚠️ 보장 매우 부족',desc:'필수 보장이 거의 없습니다. 빠른 재설계가 필요해요.'};}else{return {level:'❌ 보장 거의 없음',desc:'자녀 보험 가입을 시급히 검토하세요.'};}})();
  var recs=(function(){var r=[];if(tags.includes('no_insurance')){r.push('<strong>어린이보험 신규 가입 시급</strong> — 출생 30일 이내가 가장 유리. 30일 지난 경우라도 빠른 가입 권장');}if(tags.includes('low_coverage')||tags.includes('unknown')){r.push('진단비 보장 한도 3,000만 원 이상으로 보강');}if(tags.includes('few_essential')||tags.includes('unknown_essential')){r.push('필수 5대 특약 — 선천이상·NICU·인큐베이터·소아암·실손 — 모두 포함되었는지 약관 확인');}if(tags.includes('no_liability')){r.push('자녀배상책임 특약 추가 (월 500~2,000원, 1억 한도)');}if(tags.includes('short')){r.push('만기 100세로 전환 검토 — 0~10세 시점이 가장 유리');}if(tags.includes('serious_diag')){r.push('진단 이력 자녀는 부담보 해제 조건 확인 + 다른 보험사 동시 비교');}if(tags.includes('mild_diag')){r.push('진단 이력 자녀는 빠른 보장 보강 — 추가 진단 전 가입');}if(r.length===0)r.push('현재 보장 유지 + 3년마다 재설계 점검');r.push('4-6개 보험사 동시 비교로 최적 설계 확인');return r;})();
  document.getElementById('quiz-area').style.display='none';
  var r=document.getElementById('result-area');
  r.style.display='block';
