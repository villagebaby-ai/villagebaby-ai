<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드 v2 — villagebaby.kr</title>
<meta name="description" content="villagebaby.kr 관리자 대시보드 (내부 전용)">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
--bg:#0F172A;--bg-2:#1E293B;--bg-3:#334155;
--line:#334155;--line-2:#475569;
--t1:#F1F5F9;--t2:#CBD5E1;--t3:#94A3B8;--t4:#64748B;
--blue:#60A5FA;--blue-d:#2563EB;--blue-bg:rgba(96,165,250,.12);
--green:#34D399;--green-bg:rgba(52,211,153,.12);
--yellow:#FBBF24;--yellow-bg:rgba(251,191,36,.12);
--red:#F87171;--red-bg:rgba(248,113,113,.12);
--purple:#A78BFA;--purple-bg:rgba(167,139,250,.12);
--pink:#F472B6;--pink-bg:rgba(244,114,182,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Pretendard Variable','Pretendard',ui-monospace,'JetBrains Mono',monospace;background:var(--bg);color:var(--t1);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased;word-break:keep-all}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,select{font-family:inherit}

/* PIN gate */
.pin-gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.pin-box{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:36px 40px;text-align:center;max-width:360px}
.pin-box h1{font-size:18px;font-weight:900;margin-bottom:8px;color:var(--t1)}
.pin-box p{font-size:12.5px;color:var(--t3);margin-bottom:18px}
.pin-input{width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:8px;padding:12px 14px;font-size:18px;color:var(--t1);text-align:center;letter-spacing:0.3em;outline:none}
.pin-input:focus{border-color:var(--blue)}
.pin-error{color:var(--red);font-size:11.5px;margin-top:10px;height:14px}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(15,23,42,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.topbar .logo{font-weight:900;font-size:15px;color:var(--t1);letter-spacing:-0.01em}
.topbar .logo .badge{display:inline-block;background:var(--red-bg);color:var(--red);font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:8px;margin-left:6px;letter-spacing:0.05em}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{background:var(--bg-2);border:1px solid var(--line);padding:6px 11px;border-radius:8px;font-size:11.5px;color:var(--t2);font-weight:600}
.pill strong{color:var(--blue);font-weight:700}
.btn-refresh{background:var(--blue-d);color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700}
.btn-refresh:hover{background:#1d4ed8}

.container{max-width:1400px;margin:0 auto;padding:24px 20px 80px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:14px 16px}
.stat .lbl{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;font-weight:700;margin-bottom:6px}
.stat .val{font-size:22px;font-weight:900;color:var(--t1);letter-spacing:-0.02em}
.stat .val .unit{font-size:13px;color:var(--t3);font-weight:600;margin-left:3px}
.stat.fresh .val{color:var(--green)}
.stat.recent .val{color:var(--blue)}

/* QUICK LINKS */
.quick-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;padding:14px 16px;background:var(--bg-2);border:1px solid var(--line);border-radius:8px}
.quick-links .lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;font-weight:700;align-self:center;margin-right:6px}
.ql-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg-3);border:1px solid var(--line-2);padding:6px 11px;border-radius:8px;font-size:12px;color:var(--t2);font-weight:600;transition:.15s}
.ql-btn:hover{background:var(--blue-d);color:#fff;border-color:var(--blue)}

/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;padding:14px 16px;background:var(--bg-2);border:1px solid var(--line);border-radius:8px}
.filter-input,.filter-select{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12.5px;color:var(--t1)}
.filter-input{width:280px}
.filter-input::placeholder{color:var(--t4)}
.filter-input:focus,.filter-select:focus{outline:none;border-color:var(--blue)}
.filter-label{font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.btn-bulk{background:var(--purple);color:#fff;padding:7px 12px;border-radius:8px;font-size:11.5px;font-weight:700;margin-left:auto}
.btn-bulk:hover{background:#9333ea}
.btn-bulk:disabled{opacity:.4;cursor:not-allowed}

/* TABLE */
.table-wrap{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.url-table{width:100%;border-collapse:collapse;font-size:12.5px}
.url-table thead{background:var(--bg-3);border-bottom:1px solid var(--line)}
.url-table thead th{padding:11px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;user-select:none}
.url-table thead th:hover{color:var(--t1)}
.url-table thead th .sort-arrow{font-size:10px;color:var(--t4);margin-left:3px}
.url-table thead th.sorted .sort-arrow{color:var(--blue)}
.url-table tbody tr{border-bottom:1px solid var(--line)}
.url-table tbody tr:last-child{border-bottom:none}
.url-table tbody tr:hover{background:rgba(255,255,255,.025)}
.url-table td{padding:9px 12px;vertical-align:middle}
.url-table .col-check{width:32px;text-align:center}
.url-table .col-cat{width:90px}
.url-table .col-title{color:var(--t1);font-weight:600}
.url-table .col-title a{color:var(--t1)}
.url-table .col-title a:hover{color:var(--blue)}
.url-table .col-url{color:var(--t3);font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.url-table .col-date{width:104px;text-align:center;font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px}
.url-table .col-actions{width:130px;text-align:right;white-space:nowrap}

.cat-tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:700;letter-spacing:0.02em}
.cat-tag.guide{background:var(--blue-bg);color:var(--blue)}
.cat-tag.child{background:var(--green-bg);color:var(--green)}
.cat-tag.senior{background:var(--yellow-bg);color:var(--yellow)}
.cat-tag.care{background:var(--purple-bg);color:var(--purple)}
.cat-tag.cancer{background:var(--red-bg);color:var(--red)}
.cat-tag.magazine{background:var(--pink-bg);color:var(--pink)}
.cat-tag.hub{background:rgba(255,255,255,.05);color:var(--t2)}
.cat-tag.tools{background:rgba(96,165,250,.06);color:var(--t2)}
.cat-tag.other{background:var(--bg-3);color:var(--t3)}

.date-badge{display:inline-block;padding:3px 8px;border-radius:5px;font-weight:700;letter-spacing:0.02em}
.date-badge.fresh{background:rgba(52,211,153,.15);color:var(--green)}
.date-badge.recent{background:var(--blue-bg);color:var(--blue)}
.date-badge.old{background:rgba(148,163,184,.1);color:var(--t3)}

.btn{display:inline-block;padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;background:var(--bg-3);color:var(--t2);margin-left:4px;transition:.15s}
.btn:hover{background:var(--blue-d);color:#fff}
.btn.copy{background:var(--bg-3)}

.empty{padding:60px 20px;text-align:center;color:var(--t3);font-size:13px}
.loading{padding:60px 20px;text-align:center;color:var(--t3);font-size:13px}
.loading::before{content:'⏳ ';font-size:18px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:1024px){
.stats{grid-template-columns:repeat(3,1fr)}
.url-table .col-url{display:none}
}
@media(max-width:640px){
.stats{grid-template-columns:repeat(2,1fr)}
.filter-input{width:100%}
.url-table .col-cat{width:auto}
}
</style>
</head>
<body>

<!-- PIN GATE -->
<div class="pin-gate" id="pin-gate">
<div class="pin-box">
<h1>🔐 관리자 인증</h1>
<p>관리자 PIN 4자리를 입력해 주세요</p>
<input type="password" class="pin-input" id="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
<div class="pin-error" id="pin-error"></div>
</div>
</div>

<!-- TOPBAR -->
<div class="topbar" style="display:none" id="topbar">
<div class="logo">베이비빌리 관리자 <span class="badge">v2 자동화</span></div>
<div class="topbar-right">
<span class="pill">마지막 빌드: <strong id="last-build">--</strong></span>
<button class="btn-refresh" onclick="reload()">🔄 동기화</button>
</div>
</div>

<div class="container" style="display:none" id="main">

<!-- STATS -->
<div class="stats" id="stats">
<div class="stat"><div class="lbl">전체 페이지</div><div class="val" id="stat-total">--</div></div>
<div class="stat fresh"><div class="lbl">7일 이내</div><div class="val" id="stat-fresh">--</div></div>
<div class="stat recent"><div class="lbl">30일 이내</div><div class="val" id="stat-recent">--</div></div>
<div class="stat"><div class="lbl">태아보험</div><div class="val" id="stat-guide">--</div></div>
<div class="stat"><div class="lbl">어린이보험</div><div class="val" id="stat-child">--</div></div>
<div class="stat"><div class="lbl">기타</div><div class="val" id="stat-other">--</div></div>
</div>

<!-- QUICK LINKS -->
<div class="quick-links">
<span class="lbl">바로가기</span>
<a class="ql-btn" href="https://github.com/villagebaby-ai/villagebaby-ai" target="_blank">📦 GitHub</a>
<a class="ql-btn" href="https://search.google.com/search-console" target="_blank">🔍 GSC</a>
<a class="ql-btn" href="/sitemap.xml" target="_blank">🗺️ sitemap.xml</a>
<a class="ql-btn" href="/robots.txt" target="_blank">🤖 robots.txt</a>
<a class="ql-btn" href="/admin-vb-7k9f2x4a/seo-audit/" target="_blank">📊 SEO 감사</a>
<a class="ql-btn" href="https://villagebaby.kr/" target="_blank">🏠 사이트 홈</a>
</div>

<!-- FILTERS -->
<div class="filters">
<span class="filter-label">검색</span>
<input class="filter-input" id="q" placeholder="URL·제목 검색 (예: 태아보험)" oninput="render()">
<span class="filter-label">카테고리</span>
<select class="filter-select" id="cat-filter" onchange="render()">
<option value="">전체</option>
<option value="guide">guide</option>
<option value="child">child</option>
<option value="senior">senior</option>
<option value="care">care</option>
<option value="cancer">cancer</option>
<option value="magazine">magazine</option>
<option value="tools">tools</option>
<option value="hub">hub</option>
<option value="other">기타</option>
</select>
<span class="filter-label">기간</span>
<select class="filter-select" id="period-filter" onchange="render()">
<option value="">전체</option>
<option value="7">최근 7일</option>
<option value="30">최근 30일</option>
<option value="90">최근 90일</option>
</select>
<button class="btn-bulk" id="bulk-open" onclick="bulkOpen()" disabled>선택 열기 (0)</button>
<button class="btn-bulk" id="bulk-copy" onclick="bulkCopy()" disabled style="background:var(--bg-3);color:var(--t2)">URL 복사</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
<table class="url-table" id="url-table">
<thead>
<tr>
<th class="col-check"><input type="checkbox" id="check-all" onchange="toggleAll(this.checked)"></th>
<th class="col-cat sortable" data-sort="category">카테고리 <span class="sort-arrow">↕</span></th>
<th class="col-title sortable" data-sort="title">제목 <span class="sort-arrow">↕</span></th>
<th class="col-url">URL</th>
<th class="col-date sortable" data-sort="date">발행일 <span class="sort-arrow">↓</span></th>
<th class="col-actions">액션</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="6" class="loading">sitemap.xml 로딩 중...</td></tr>
</tbody>
</table>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== PIN GATE =====
const ADMIN_PIN = '7294';
const pinInput = document.getElementById('pin-input');
const pinError = document.getElementById('pin-error');

function authed(){
  document.getElementById('pin-gate').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('main').style.display = 'block';
  loadData();
}

if (sessionStorage.getItem('vb-admin-ok') === '1') {
  authed();
} else {
  pinInput.focus();
  pinInput.addEventListener('input', () => {
    pinError.textContent = '';
    if (pinInput.value.length === 4) {
      if (pinInput.value === ADMIN_PIN) {
        sessionStorage.setItem('vb-admin-ok', '1');
        authed();
      } else {
        pinError.textContent = 'PIN이 일치하지 않아요';
        pinInput.value = '';
      }
    }
  });
}

// ===== DATA =====
let pages = [];
let sortKey = 'date';
let sortDir = 'desc';

const CAT_MAP = {
  'guide': '태아보험',
  'child': '어린이',
  'senior': '5세대',
  'care': '간병',
  'cancer': '암',
  'magazine': '매거진',
  'tools': '도구',
  'education': '교육',
  'female': '여성',
  'driver': '운전',
  'ads': '광고',
  'medical': '의료'
};

function getCategory(url) {
  const m = url.match(/villagebaby\.kr\/([^\/]+)\//);
  if (!m) return 'hub';
  const seg = m[1];
  if (CAT_MAP[seg]) return seg;
  return seg === '' ? 'hub' : 'other';
}

function slugToTitle(url) {
  // URL slug → 사람 읽는 제목
  try {
    const path = new URL(url).pathname;
    const seg = path.split('/').filter(s => s).pop() || '홈';
    return decodeURIComponent(seg).replace(/-/g, ' ');
  } catch (e) { return url; }
}

function dateBadgeClass(lastmod) {
  if (!lastmod) return 'old';
  const days = Math.floor((Date.now() - new Date(lastmod).getTime()) / 86400000);
  if (days <= 7) return 'fresh';
  if (days <= 30) return 'recent';
  return 'old';
}

async function loadData() {
  try {
    const resp = await fetch('/sitemap.xml?_=' + Date.now());
    const xml = await resp.text();
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const urls = [...doc.querySelectorAll('url')];
    pages = urls.map(u => {
      const loc = u.querySelector('loc')?.textContent || '';
      const lastmod = u.querySelector('lastmod')?.textContent || '';
      return {
        url: loc,
        lastmod: lastmod,
        category: getCategory(loc),
        title: slugToTitle(loc),
        checked: false
      };
    }).filter(p => p.url && !p.url.includes('admin-')); // admin 페이지 제외

    // 마지막 빌드 시각 (GitHub commits API)
    try {
      const ghResp = await fetch('https://api.github.com/repos/villagebaby-ai/villagebaby-ai/commits?per_page=1');
      const ghData = await ghResp.json();
      if (ghData[0]) {
        const d = new Date(ghData[0].commit.committer.date);
        document.getElementById('last-build').textContent =
          d.getMonth()+1 + '/' + d.getDate() + ' ' +
          String(d.getHours()).padStart(2,'0') + ':' +
          String(d.getMinutes()).padStart(2,'0');
      }
    } catch(e) {}

    updateStats();
    render();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="6" class="empty">⚠️ sitemap.xml 로딩 실패: ' + e.message + '</td></tr>';
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = pages.length;
  const fresh = pages.filter(p => dateBadgeClass(p.lastmod) === 'fresh').length;
  const recent = pages.filter(p => {
    const c = dateBadgeClass(p.lastmod);
    return c === 'fresh' || c === 'recent';
  }).length;
  document.getElementById('stat-fresh').textContent = fresh;
  document.getElementById('stat-recent').textContent = recent;
  document.getElementById('stat-guide').textContent = pages.filter(p => p.category === 'guide').length;
  document.getElementById('stat-child').textContent = pages.filter(p => p.category === 'child').length;
  document.getElementById('stat-other').textContent = pages.filter(p => !['guide','child'].includes(p.category)).length;
}

// ===== RENDER =====
function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const period = document.getElementById('period-filter').value;
  const periodDays = parseInt(period);

  let filtered = pages.filter(p => {
    if (q && !(p.title.toLowerCase().includes(q) || p.url.toLowerCase().includes(q))) return false;
    if (cat && p.category !== cat) return false;
    if (periodDays && p.lastmod) {
      const days = Math.floor((Date.now() - new Date(p.lastmod).getTime()) / 86400000);
      if (days > periodDays) return false;
    }
    return true;
  });

  // 정렬
  filtered.sort((a,b) => {
    let v = 0;
    if (sortKey === 'date') v = (a.lastmod||'').localeCompare(b.lastmod||'');
    else if (sortKey === 'category') v = a.category.localeCompare(b.category);
    else if (sortKey === 'title') v = a.title.localeCompare(b.title);
    return sortDir === 'desc' ? -v : v;
  });

  const tbody = document.getElementById('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">조건에 맞는 페이지가 없어요.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map((p, i) => {
    const dateClass = dateBadgeClass(p.lastmod);
    const dateText = p.lastmod || '-';
    const catLabel = CAT_MAP[p.category] || p.category;
    return `<tr>
<td class="col-check"><input type="checkbox" class="page-check" data-url="${p.url}" ${p.checked?'checked':''} onchange="onCheck(this, '${p.url}')"></td>
<td class="col-cat"><span class="cat-tag ${p.category}">${catLabel}</span></td>
<td class="col-title"><a href="${p.url}" target="_blank">${p.title}</a></td>
<td class="col-url" title="${p.url}">${p.url.replace('https://villagebaby.kr','')}</td>
<td class="col-date"><span class="date-badge ${dateClass}">${dateText}</span></td>
<td class="col-actions">
<a class="btn" href="${p.url}" target="_blank">열기</a>
<button class="btn copy" onclick="copyUrl('${p.url}')">복사</button>
</td>
</tr>`;
  }).join('');

  updateBulkCount();
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => showToast('URL 복사됨'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ===== BULK =====
function onCheck(el, url) {
  const p = pages.find(x => x.url === url);
  if (p) p.checked = el.checked;
  updateBulkCount();
}

function toggleAll(checked) {
  document.querySelectorAll('.page-check').forEach(c => {
    c.checked = checked;
    const url = c.dataset.url;
    const p = pages.find(x => x.url === url);
    if (p) p.checked = checked;
  });
  updateBulkCount();
}

function updateBulkCount() {
  const n = pages.filter(p => p.checked).length;
  document.getElementById('bulk-open').textContent = `선택 열기 (${n})`;
  document.getElementById('bulk-open').disabled = n === 0;
  document.getElementById('bulk-copy').disabled = n === 0;
  document.getElementById('bulk-copy').textContent = n > 0 ? `URL ${n}개 복사` : 'URL 복사';
}

function bulkOpen() {
  const sel = pages.filter(p => p.checked);
  if (sel.length > 20 && !confirm(sel.length + '개 탭을 한 번에 열까요? (팝업 차단 주의)')) return;
  sel.forEach(p => window.open(p.url, '_blank'));
}

function bulkCopy() {
  const urls = pages.filter(p => p.checked).map(p => p.url).join('\n');
  navigator.clipboard.writeText(urls).then(() => showToast(pages.filter(p => p.checked).length + '개 URL 복사됨'));
}

function reload() {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="loading">동기화 중...</td></tr>';
  loadData();
}

// ===== SORT =====
document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (sortKey === key) {
      sortDir = sortDir === 'desc' ? 'asc' : 'desc';
    } else {
      sortKey = key;
      sortDir = 'desc';
    }
    document.querySelectorAll('th.sortable').forEach(t => {
      t.classList.remove('sorted');
      t.querySelector('.sort-arrow').textContent = '↕';
    });
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir === 'desc' ? '↓' : '↑';
    render();
  });
});
</script>
</body>
</html>
