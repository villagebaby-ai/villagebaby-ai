<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빌베인 책장 — 빌리지베이비 책잇기</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/webp" href="/assets/img/favicon.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue-50:#EAF1F9; --blue-100:#D6E4F4; --blue:#3373BA; --blue-700:#2D66A3; --blue-900:#19385C;
  --peach-50:#FDF6F1; --peach-100:#FBEADF; --peach:#F6D5C3; --peach-deep:#E0A684; --peach-text:#8A4A2C;
  --ink:#16161A; --ink-2:#46463F; --gray:#898989; --bg:#F8F8F6; --surface:#fff; --border:#EAEAE3;
  --font:'Noto Sans KR',-apple-system,sans-serif; --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; word-break:keep-all; line-height:1.5}
.wrap{max-width:1160px; margin:0 auto; padding:clamp(40px,7vw,84px) clamp(20px,5vw,48px) 90px}

/* hero */
.kick{display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:700; letter-spacing:.18em; color:var(--blue); text-transform:uppercase}
.kick::before{content:""; width:24px; height:2px; background:var(--blue); opacity:.55}
h1{font-weight:900; letter-spacing:-.04em; font-size:clamp(34px,6vw,60px); line-height:1.08; margin:16px 0 0}
.sub{font-size:clamp(15px,1.8vw,19px); color:var(--ink-2); line-height:1.7; margin-top:18px; max-width:640px}
.stat{display:flex; flex-wrap:wrap; gap:10px 22px; margin-top:26px; font-size:14px; color:var(--gray); font-weight:500}
.stat b{color:var(--blue); font-weight:900; font-size:17px}

/* filters */
.filters{display:flex; flex-wrap:wrap; gap:9px; margin:34px 0 30px; position:sticky; top:0; padding:14px 0; background:linear-gradient(var(--bg) 72%, transparent); z-index:5}
.chip{border:1px solid var(--border); background:#fff; color:var(--ink-2); font-family:inherit; font-size:14px; font-weight:700; padding:9px 16px; border-radius:99px; cursor:pointer; transition:all .18s var(--ease)}
.chip:hover{border-color:var(--blue-100); color:var(--blue)}
.chip.on{background:var(--blue); border-color:var(--blue); color:#fff; box-shadow:0 6px 16px rgba(45,102,163,.22)}

/* grid */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:20px}
.book{background:#fff; border:1px solid var(--border); border-radius:18px; overflow:hidden; display:flex; flex-direction:column; transition:transform .22s var(--ease), box-shadow .22s var(--ease)}
.book:hover{transform:translateY(-4px); box-shadow:0 18px 40px rgba(45,102,163,.13)}
.cov{position:relative; min-height:132px; display:flex; align-items:center; justify-content:center; padding:24px 22px 22px; text-align:center}
.cov::before{content:""; position:absolute; left:0; top:0; bottom:0; width:7px; background:rgba(0,0,0,.16)}
.cov .ct{color:#fff; font-weight:900; font-size:clamp(17px,2vw,20px); letter-spacing:-.02em; line-height:1.3; text-shadow:0 2px 10px rgba(0,0,0,.16); z-index:1}
.body{padding:18px 18px 16px; display:flex; flex-direction:column; gap:11px; flex:1}
.pill{align-self:flex-start; font-size:11.5px; font-weight:900; letter-spacing:.02em; padding:4px 11px; border-radius:99px}
.by{font-size:13px; font-weight:900; color:var(--ink)}
.by span{color:var(--gray); font-weight:500}
.rec{font-size:13.5px; line-height:1.6; color:var(--ink-2); flex:1}
.go{display:inline-flex; align-items:center; gap:5px; align-self:flex-start; margin-top:4px; font-size:12.5px; font-weight:700; color:var(--blue); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .15s}
.go:hover{border-color:var(--blue)}
.empty{display:none; text-align:center; color:var(--gray); padding:50px 0; font-size:15px}

.foot{margin-top:56px; padding-top:26px; border-top:1px solid var(--border); font-size:13px; color:var(--gray); line-height:1.7}
.foot b{color:var(--ink-2); font-weight:700}
@media (max-width:520px){ .grid{grid-template-columns:1fr 1fr; gap:13px} .cov{min-height:112px; padding:18px 12px} .cov .ct{font-size:15px} .body{padding:13px 13px 14px; gap:8px} .rec{font-size:12.5px} }
</style>
</head>
<body>
<main class="wrap">
  <span class="kick">Team Book-it · 책잇기</span>
  <h1>빌베인 책장</h1>
  <p class="sub">한 사람이 읽고, 다음 사람에게 잇는 — 빌리지베이비 팀이 서로에게 건넨 책과 한 줄의 마음을 모았어요.</p>
  <div class="stat"><span><b id="cnt">29</b>권의 책</span><span><b>29</b>명의 빌베인</span><span>📚 지금도 이어지는 중</span></div>

  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">해당 분야의 책이 아직 없어요.</div>

  <p class="foot"><b>책잇기(Book-it)</b>는 빌베인이 최근 읽은 책 한 권을 <b>한 줄 추천</b>과 함께 다음 사람에게 잇는 릴레이예요.<br>각 카드의 링크는 도서 검색으로 연결됩니다. · 빌리지베이비</p>
</main>

<script>
(function(){
  "use strict";
  var G={
    career:{n:"일·커리어", c:"linear-gradient(135deg,#2D66A3,#4A89CC)", pb:"#EAF1F9", pc:"#2D66A3"},
    self:{n:"자기계발", c:"linear-gradient(135deg,#C97B4E,#E0A684)", pb:"#FBEADF", pc:"#8A4A2C"},
    philo:{n:"철학·인문", c:"linear-gradient(135deg,#5E4A99,#8A7BC0)", pb:"#E7E0F6", pc:"#5E4A99"},
    sci:{n:"과학·심리", c:"linear-gradient(135deg,#2C7A58,#57A882)", pb:"#D5EEE1", pc:"#2C7A58"},
    novel:{n:"소설·에세이", c:"linear-gradient(135deg,#B0503A,#D2795E)", pb:"#F6E2DA", pc:"#9A3F2A"},
    family:{n:"육아·가족", c:"linear-gradient(135deg,#8A6A1E,#C9A94A)", pb:"#FBEDBD", pc:"#7A5A12"}
  };
  var BOOKS=[
    {t:"나의 인생이 당신의 지혜가 된다면",by:"로지",g:"self",r:"“어떻게 살 것인가는 내 중심에 달려 있다.” 다양한 삶의 경험이 궁금한 분께."},
    {t:"경복궁 환상 여행",by:"채영",g:"philo",r:"근정전·경회루에 숨은 73가지 동물 찾기. 궁궐을 새롭게 보고 싶은 분께."},
    {t:"나는 매주 시체를 보러 간다",by:"한나",g:"sci",r:"범죄학과 인간 본성에 관심 있고, 사건 묘사에 거부감 없는 분께."},
    {t:"실리콘밸리의 팀장들",by:"쭈",g:"career",r:"팀 리더·매니저, 조직의 피드백 문화를 고민하는 분께."},
    {t:"바람이 분다 당신이 좋다",by:"상준",g:"novel",r:"잔잔하고 따뜻하게 쉬고 싶은 사람, 극한의 F 감성이 궁금한 T에게."},
    {t:"마음의 지혜",by:"선우",g:"sci",r:"번아웃과 '자발적 전환'. 삶의 기준이 되어줄 8가지 심리학."},
    {t:"원칙 (Principles)",by:"아써",g:"career",r:"삶과 일에서 복잡한 문제에 직면한 사람, 혹은 관리자에게."},
    {t:"스토너",by:"지원",g:"novel",r:"평범한 삶 속에서 나의 가치와 행복을 찾아가는 이야기."},
    {t:"장미와 나이프",by:"엘린",g:"novel",r:"책과 안 친했던 분도 몰입되는, 후루룩 읽는 추리극."},
    {t:"AI시대 돈 버는 규칙이 뒤바뀐다",by:"제혁",g:"career",r:"생성형 AI로 수익화하는 아이디어가 궁금한 분께."},
    {t:"원씽 (One Thing)",by:"고니",g:"self",r:"목표가 많을수록 성공은 멀어진다. 딱 하나에 집중하기."},
    {t:"대논쟁! 철학배틀",by:"우리",g:"philo",r:"사상가 37명의 논쟁으로 즐기는 지적인 '싸움 구경'."},
    {t:"모순",by:"지현",g:"novel",r:"삶은 모순 그 자체. 인생의 정답이 궁금한 사람에게."},
    {t:"노이즈: 생각의 잡음",by:"이슬",g:"sci",r:"당연한 판단을 다시 보고, 잡음을 피해 더 좋은 선택으로."},
    {t:"어떤 개발자가 되고 싶니",by:"진수",g:"career",r:"개발자로 커리어를 이어가거나 전환하려는 분께."},
    {t:"경험의 멸종",by:"린",g:"philo",r:"'대리 체험'만 늘어나는 현실에서, 경험의 의미를 다시 묻다."},
    {t:"사고 싶게 만드는 것들",by:"효",g:"career",r:"무엇이든 만들어 파는 사람이라면 누구에게나."},
    {t:"논어",by:"수민",g:"philo",r:"하루 한 문장, 가벼운 마음으로 생각을 정리하고 싶다면."},
    {t:"식물의 사회생활",by:"혜준",g:"sci",r:"식물과 자연을 좋아하고, 사랑하는 사람에게."},
    {t:"노희영의 브랜딩 법칙",by:"서현",g:"career",r:"내 일과 가치관을 더 단단히 하고 싶은 모두에게."},
    {t:"구글은 어떻게 일하는가",by:"소현",g:"career",r:"일 잘하고 싶은 사람, 목표 설정이 고민인 사람에게."},
    {t:"우리의 낙원에서 만나자",by:"태윤",g:"novel",r:"가볍게 읽으며 생각을 정리하고, 잠깐 숨 고르고 싶을 때."},
    {t:"모순",by:"정윤",g:"novel",r:"<참을 수 없는 존재의 가벼움>과 함께 읽는, 결혼 전 '양대산맥'."},
    {t:"다정한 사람이 이긴다",by:"찬주",g:"sci",r:"힘이 되는 책이 필요한 분, 관계가 고민인 분께."},
    {t:"딸은 엄마의 감정을 먹고 자란다",by:"대니",g:"family",r:"감정을 미뤄온 딸들, 사랑과 책임의 경계를 고민하는 이에게."},
    {t:"뇌는 어떻게 나를 조종하는가",by:"영주",g:"sci",r:"생각이 어디서 어떻게 오는지 궁금한 분께."},
    {t:"초역 부처의 말",by:"종민",g:"philo",r:"감정을 정리하고 다시 시작하게 돕는, 짧고 실용적인 문장들."},
    {t:"동물농장",by:"혜민",g:"novel",r:"짧지만 깊은 메시지를 담은 고전을 읽고 싶은 분께."},
    {t:"한 뼘의 계절에서 배운 것",by:"유리",g:"novel",r:"사계절의 흐름 속 사소한 감정으로 나를 이해하게 되는 에세이."}
  ];
  var order=["career","self","philo","sci","novel","family"];
  var grid=document.getElementById('grid'), filters=document.getElementById('filters'), empty=document.getElementById('empty');
  document.getElementById('cnt').textContent=BOOKS.length;

  function esc(s){return s.replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  BOOKS.forEach(function(b){
    var g=G[b.g], card=document.createElement('article');
    card.className='book'; card.setAttribute('data-g',b.g);
    card.innerHTML=''
      +'<div class="cov" style="background:'+g.c+'"><span class="ct">'+esc(b.t)+'</span></div>'
      +'<div class="body">'
      +'<span class="pill" style="background:'+g.pb+';color:'+g.pc+'">'+g.n+'</span>'
      +'<div class="by">'+esc(b.by)+'님의 선택 <span>· 한 줄 추천</span></div>'
      +'<p class="rec">'+esc(b.r)+'</p>'
      +'<a class="go" href="https://search.kyobobook.co.kr/search?keyword='+encodeURIComponent(b.t)+'" target="_blank" rel="noopener noreferrer">책 보러 가기 →</a>'
      +'</div>';
    grid.appendChild(card);
  });

  var cards=[].slice.call(grid.children), cur="all";
  function mkChip(key,label){ var c=document.createElement('button'); c.className='chip'+(key==="all"?' on':''); c.type='button'; c.textContent=label; c.setAttribute('data-k',key); c.addEventListener('click',function(){ setFilter(key); }); filters.appendChild(c); return c; }
  mkChip("all","전체");
  order.forEach(function(k){ mkChip(k,G[k].n); });
  function setFilter(k){
    cur=k; var n=0;
    [].forEach.call(filters.children,function(ch){ ch.classList.toggle('on', ch.getAttribute('data-k')===k); });
    cards.forEach(function(c){ var show=(k==="all"||c.getAttribute('data-g')===k); c.style.display=show?'':'none'; if(show)n++; });
    empty.style.display=n?'none':'block';
  }
})();
</script>
</body>
</html>
